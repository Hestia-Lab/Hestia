[profile.default]
src = "src"
out = "out"
test = "test"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
# No external Solidity libraries: a minimal Vm interface lives in test/utils, and a
# minimal IERC20 is inlined. Poseidon is deployed from circomlib-generated bytecode.
fs_permissions = [{ access = "read", path = "./test/fixtures" }]

[fmt]
line_length = 100
tab_width = 4

[rpc_endpoints]
base = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", chain = 8453 }
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532 }
